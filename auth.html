<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực - BACYKISM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <h1 class="auth-logo">BACYKISM</h1>
        
        <div class="auth-social-buttons">
            <button class="btn-social btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                Tiếp tục với Google
            </button>
            <button class="btn-social btn-apple">
                <i class="fab fa-apple"></i>
                Tiếp tục với Apple
            </button>
        </div>

        <div class="auth-divider">
            <span>Hoặc</span>
        </div>

        <form id="auth-form" class="auth-form">
            <input type="email" id="auth-email" placeholder="Nhập địa chỉ email" required>
            <input type="password" id="auth-password" placeholder="Nhập mật khẩu" style="display: none;">
            
            <button type="submit" class="btn-submit-auth" id="btn-auth-continue">Tiếp tục</button>
        </form>

        <a href="index.html" class="auth-back-link">Quay lại và tiếp tục mua hàng</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
